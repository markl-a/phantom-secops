name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: install dry-run
        run: python -m pip install -e . --dry-run --no-deps

      - name: wheel build
        run: python -m pip wheel . --no-deps -w dist

      - name: make demo-mock
        run: make demo-mock

      - name: public reasoning smoke
        run: |
          python -m phantom_secops.reasoning_scenario --out /tmp/phantom-secops-reasoning
          test -f /tmp/phantom-secops-reasoning/manifest.json

      - name: pytest
        run: python -m pytest -q

      - name: release-prep gate
        run: python -m pytest tests/test_release_prep_contract.py -q

      - name: make verify-goal
        run: make verify-goal

      - name: make lint-mesh-config
        run: make lint-mesh-config
