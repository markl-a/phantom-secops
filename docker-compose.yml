# phantom-secops isolated lab
# All services run on a private bridge network. No host ports are exposed
# by default — uncomment the `ports:` blocks below if you need browser access.
#
# DO NOT expose any of these services on a public network. They are
# intentionally vulnerable. See ETHICS.md.

networks:
  secops-lab:
    driver: bridge
    internal: false   # set to true for full air-gap (breaks `docker compose pull`)

services:

  # OWASP Juice Shop — modern web app with OWASP Top 10 vulns
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: secops-juice-shop
    restart: unless-stopped
    networks:
      - secops-lab
    # ports:
    #   - "127.0.0.1:3000:3000"   # uncomment to view in browser at localhost:3000
    healthcheck:
      # The juice-shop image is distroless-style — only the node binary, no shell
      # or wget. The old wget-based check could never run, so the container
      # reported "unhealthy" forever and `make lab-up` failed its readiness gate
      # even though the app was serving fine. Use the node runtime that IS present.
      test: ["CMD", "/nodejs/bin/node", "-e", "require('http').get('http://localhost:3000/rest/admin/application-version',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s   # juice-shop is slow to boot; don't flag unhealthy meanwhile

  # DVWA — classic PHP/MySQL deliberately vulnerable web app
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: secops-dvwa
    restart: unless-stopped
    networks:
      - secops-lab
    # ports:
    #   - "127.0.0.1:8080:80"
    environment:
      - MYSQL_HOSTNAME=dvwa-db
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd

  dvwa-db:
    image: mariadb:10.6
    container_name: secops-dvwa-db
    restart: unless-stopped
    networks:
      - secops-lab
    environment:
      - MYSQL_ROOT_PASSWORD=dvwaroot
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd

  # The "attacker" container that the phantom red-team agents shell into
  # for Nmap / Nuclei / Nikto runs. Built from Dockerfile.attacker (Kali base)
  # which pre-bakes nmap + nuclei (pinned) + templates, so the live vuln-scan
  # path has nuclei available without a fragile runtime `go install`. Using the
  # raw kali image with an inline apt-get (the old approach) left nuclei absent,
  # which is why the live nuclei path could never be validated end-to-end (G2).
  attacker:
    build:
      context: .
      dockerfile: Dockerfile.attacker
    image: phantom-secops/attacker:latest
    container_name: secops-attacker
    networks:
      - secops-lab
    # CMD ["sleep", "infinity"] comes from the Dockerfile; keeps the container
    # alive so `docker exec` works for the tool wrappers. Attack tooling stays
    # off the host by design.

  # Lightweight log collector for blue-team agents to ingest from.
  # Tails container logs into a file the log-anomaly agent can read.
  log-collector:
    image: alpine:3.19
    container_name: secops-log-collector
    networks:
      - secops-lab
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./reports/lab-logs:/logs
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache docker-cli && \
        while true; do
          docker logs --since 30s secops-juice-shop >> /logs/juice-shop.log 2>&1 || true
          docker logs --since 30s secops-dvwa >> /logs/dvwa.log 2>&1 || true
          sleep 30
        done
